name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bagbots-tools/package-lock.json

      - name: Install
        working-directory: bagbots-tools
        run: npm ci

      - name: Build
        working-directory: bagbots-tools
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          npx ng build --configuration production --base-href "/${REPO_NAME}/"

      # IMPORTANT: adjust this path if your dist structure differs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bagbots-tools/dist/bagbots-tools

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4